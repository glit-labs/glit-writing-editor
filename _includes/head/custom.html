<!-- start custom head snippets -->

<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="192x192" href="{{ '/assets/images/favicon-192.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

<style>
  /* ===== Type scale — lighter, less bulky than the theme defaults =====
     Minimal Mistakes scales the root font from 16px up to 20px (>=1024px) and
     22px (>=1280px), which makes text feel oversized. Shrink the whole scale
     (15 / 15 / 16 / 17px) so the page reads lighter and more compact. */
  html { font-size: 15px; }
  @media (min-width: 48em) { html { font-size: 15px; } }
  @media (min-width: 64em) { html { font-size: 16px; } }
  @media (min-width: 80em) { html { font-size: 17px; } }
  /* Headings default to bold (700) serif, which reads heavy. Medium (500)
     keeps the Playfair character while feeling markedly lighter and airier. */
  h1, h2, h3, h4, h5, h6 { font-weight: 500; }

  /* ===== Glit brand ===== */
  .masthead { background-color: #f4f1ea; border-bottom: 1px solid #e7e1d6; }

  /* Brand logo: serif wordmark + terracotta text cursor (from the app icon). */
  .site-title { text-decoration: none; }
  .glit-brand { display: inline-flex; align-items: center; line-height: 1; font-family: "Playfair Display", Georgia, serif; }
  /* Refined serif wordmark with wide tracking, matching the app's "Glit" lockup. */
  .glit-brand__word { font-weight: 500; font-size: 1.32em; color: #211f1c; letter-spacing: 0.1em; }
  .glit-brand__cursor { display: inline-block; width: 0.12em; height: 1.08em; margin-left: 0.08em; background: #c96a45; border-radius: 1px; }

  /* Hero: cleaner (no text shadow) + terracotta action buttons on the warm dark overlay. */
  .page__hero--overlay .page__title,
  .page__hero--overlay .page__lead { text-shadow: none; }
  .page__hero--overlay .btn { background-color: #c96a45; border-color: #c96a45; color: #fff; box-shadow: none; text-shadow: none; }
  .page__hero--overlay .btn:hover { background-color: #a9522f; border-color: #a9522f; color: #fff; }

  /* ===== Shared masthead dropdowns (language selector + nav menus) =====
     The masthead's .visible-links has `overflow: hidden`, which would clip a
     normally-positioned dropdown, so the menu is `position: fixed` and placed by
     the script below (aligned per the details' data-align attribute). */
  .js-dropdown { position: relative; display: inline-block; }
  .js-dropdown__toggle {
    cursor: pointer;
    list-style: none;
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
  }
  .js-dropdown__toggle::-webkit-details-marker { display: none; }
  .js-dropdown__toggle::marker { content: ""; }
  .js-dropdown__menu {
    position: fixed;
    top: -9999px;
    left: 0;
    margin: 0;
    padding: 0.4em 0;
    min-width: 11em;
    list-style: none;
    background: #fff;
    border: 1px solid #e7e1d6;
    border-radius: 6px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.14);
    z-index: 1000;
  }
  .js-dropdown__menu li { margin: 0; }
  .js-dropdown__menu a {
    display: block;
    padding: 0.55em 1.2em;
    white-space: nowrap;
    text-decoration: none;
    color: #211f1c;
  }
  .js-dropdown__menu a:hover { background: #f4f1ea; color: #a9522f; }
  .js-dropdown__menu a[aria-current="true"] { font-weight: 700; color: #211f1c; }

  /* Nav dropdown triggers (Products, Support) — match the masthead links. */
  .nav-dropdown__toggle { margin: 0 1rem; color: #211f1c; }
  .nav-dropdown__toggle:hover { color: #c96a45; }
  .nav-dropdown__caret {
    display: inline-block; margin-left: 0.4em; width: 0; height: 0;
    border-left: 0.28em solid transparent; border-right: 0.28em solid transparent;
    border-top: 0.32em solid currentColor;
  }

  /* Language selector specifics. */
  .language-switch__toggle { gap: 0.35em; }
  /* Pin the selector to the far right of the nav (it is first in the DOM so the
     greedy-nav folds the real links first and keeps the selector visible). */
  .masthead__menu-item--language { order: 999; margin-left: 0.75em; }
  @media (max-width: 767px) {
    .language-switch__current { display: none; }
    .masthead__menu-item--language { margin-left: 0.25em; }
    .language-switch__toggle { padding: 0.4em 0.5em; font-size: 1.1em; }
  }

  /* ===== Uniform content width =====
     The splash home fills the full ~1280px content area, but single-layout
     pages reserve a ~300px right-sidebar gutter, leaving a much narrower,
     right-floated column. Drop the reservation so every page matches the
     home's width and aligns to the same left edge as the masthead. */
  @media (min-width: 64em) {
    .layout--single .page { float: none; width: 100%; padding-right: 0; }
  }

  /* Section jump-nav (used on the Releases page in place of a sticky TOC). */
  .section-nav { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0 0 2.2rem; padding: 0; }
  .section-nav a {
    display: inline-block; padding: 0.4rem 0.95rem;
    background: #fbf9f5; border: 1px solid #e7e1d6; border-radius: 999px;
    color: #211f1c; text-decoration: none; font-size: 0.9rem; font-weight: 600;
  }
  .section-nav a:hover { background: #c96a45; border-color: #c96a45; color: #fff; }

  /* Wide, boxed tables so the full-width release/changelog tables read cleanly. */
  .page__content table { display: table; width: 100%; margin: 1.2rem 0 2rem; }
  .page__content th { background: #efe9de; }

  /* Hide the theme's auto-injected heading anchor ("Permalink") links. The
     heading `id`s remain, so in-page anchors still work. */
  .header-link { display: none; }

  /* Highlight cards (Privacy summary, etc.). */
  .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.25rem; margin: 1.5rem 0 2.5rem; }
  .info-card { background: #fbf9f5; border: 1px solid #e7e1d6; border-left: 4px solid #c96a45; border-radius: 8px; padding: 1.2rem 1.35rem; }
  .info-card h3 { margin: 0 0 0.4rem; font-size: 1.05rem; font-family: "Playfair Display", Georgia, serif; }
  .info-card p { margin: 0; color: #3f3b35; font-size: 0.95rem; }

  /* ===== Guide list (index of guide articles) =====
     The card is an <a>, so scope under .page__content to beat the theme's
     default link colour + underline (otherwise the whole card renders
     terracotta and underlined). Clean hairline card, terracotta hover. */
  .guide-list { display: grid; gap: 1.1rem; margin: 2rem 0; }
  .page__content a.guide-card {
    display: block; background: #fbf9f5; border: 1px solid #e7e1d6; border-radius: 10px;
    padding: 1.5rem 1.7rem; text-decoration: none; color: inherit;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
  }
  .page__content a.guide-card:hover {
    text-decoration: none; border-color: #c96a45;
    box-shadow: 0 6px 18px rgba(33,31,28,0.08); transform: translateY(-1px);
  }
  .guide-card__title { font-family: "Playfair Display", Georgia, serif; margin: 0 0 0.45rem; font-size: 1.3rem; line-height: 1.3; color: #211f1c; }
  .guide-card__desc { margin: 0 0 0.9rem; color: #6f685f; font-size: 0.98rem; line-height: 1.6; }
  .guide-card__more { display: inline-block; color: #c96a45; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.02em; }

  /* "← 가이드 목록" back link on individual guide pages. */
  .guide-back { margin: 0 0 1.5rem; }
  .guide-back a { font-weight: 600; font-size: 0.92rem; }

  /* Numbered step-by-step walkthrough (instruction + screenshot) in a guide.
     Each step is a distinct card (cream fill + hairline, like the store/support
     cards) so visitors can clearly tell one step from the next. Editorial serif
     numerals in terracotta; screenshots blend in with a hairline frame. */
  .walkthrough { list-style: none; margin: 2rem 0 0.5rem; padding: 0; counter-reset: wstep; }
  .walkthrough > li {
    position: relative; counter-increment: wstep;
    background: #fbf9f5; border: 1px solid #e7e1d6; border-radius: 12px;
    padding: 1.5rem 1.7rem 1.7rem; margin: 0 0 1.25rem;
  }
  .walkthrough > li::before { content: none; } /* kill theme list markers */
  .walkthrough__head { display: flex; align-items: baseline; gap: 0.85rem; margin: 0; }
  .walkthrough__num {
    flex: none; min-width: 1.9rem;
    font-family: "Playfair Display", Georgia, serif;
    font-size: 1.7rem; font-weight: 700; line-height: 1; color: #c96a45;
  }
  .walkthrough__text { margin: 0.1rem 0 0; font-size: 1.06rem; line-height: 1.6; color: #211f1c; }
  .walkthrough__hint { display: block; margin-top: 0.3rem; color: #8a8378; font-size: 0.92rem; font-weight: 400; }
  .walkthrough__img {
    display: block; width: 100%; max-width: 620px; height: auto;
    margin: 1.15rem 0 0 2.75rem; /* align under the text, past the numeral */
    border: 1px solid #e7e1d6; border-radius: 8px; background: #fff;
  }
  .page__content p.walkthrough__done {
    background: #fbf9f5; border: 1px solid #e7e1d6; border-left: 4px solid #c96a45;
    border-radius: 8px; padding: 1rem 1.25rem; margin: 0.5rem 0 0;
    color: #3f3b35; font-size: 1rem; line-height: 1.6;
  }
  .walkthrough__done i { color: #c96a45; margin-right: 0.5rem; }
  .walkthrough__done strong { color: #211f1c; }
  @media (max-width: 600px) {
    .walkthrough > li { padding: 1.25rem 1.2rem 1.4rem; }
    .walkthrough__img { margin-left: 0; }
  }

  /* Support page cards + FAQ. */
  .support-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; margin: 2rem 0; }
  .support-card { background: #fbf9f5; border: 1px solid #e7e1d6; border-radius: 10px; padding: 1.5rem 1.6rem; }
  .support-card h3 { font-family: "Playfair Display", Georgia, serif; margin: 0 0 0.5rem; font-size: 1.2rem; }
  .support-card p { margin: 0 0 0.5rem; color: #3f3b35; }
  .support-card p:last-child { margin-bottom: 0; }
  .faq { margin: 2.5rem 0 1rem; }
  .faq__item { border-top: 1px solid #e7e1d6; padding: 1.15rem 0; }
  .faq__item:last-child { border-bottom: 1px solid #e7e1d6; }
  .faq__q { font-weight: 700; margin: 0 0 0.4rem; font-size: 1.05rem; }
  .faq__a { margin: 0; color: #3f3b35; }
  .faq__a a { font-weight: 600; }

  /* ===== Store cards ===== */
  .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin: 2rem 0; }
  .store-card {
    display: flex; flex-direction: column;
    background: #fbf9f5; border: 1px solid #e7e1d6; border-radius: 10px;
    padding: 1.6rem 1.6rem 1.8rem;
  }
  .store-card__icon { font-size: 2.1rem; color: #211f1c; margin-bottom: 0.5rem; line-height: 1; }
  .store-card__name { font-family: "Playfair Display", Georgia, serif; font-weight: 700; margin: 0 0 0.1rem; font-size: 1.35rem; }
  .store-card__platform { color: #8a8378; font-size: 0.85rem; margin: 0 0 0.9rem; }
  .store-card__desc { color: #6f685f; font-size: 0.92rem; line-height: 1.5; margin: 0 0 1.3rem; }
  .store-card__price { color: #211f1c; font-size: 1.1rem; font-weight: 600; margin: 0 0 1.3rem; }
  .store-card__price .note { color: #8a8378; font-weight: 400; font-size: 0.85rem; }
  .store-card__btn {
    align-self: flex-start; margin-top: auto; display: inline-block;
    background: #c96a45; color: #fff; text-decoration: none;
    font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; font-size: 0.8rem;
    padding: 0.7rem 1.5rem; border-radius: 5px;
  }
  .store-card__btn:hover { background: #a9522f; color: #fff; }
  .store-card__btn--disabled { background: #d8d1c4; color: #fff; pointer-events: none; }
  @media (max-width: 600px) { .store-grid { grid-template-columns: 1fr; } }

  /* ===== Landing page (home) ===== */
  /* Centered section heading + lead, without the default h2 divider rule. */
  .page__content h2.lp-heading { border-bottom: 0; padding-bottom: 0; text-align: center; margin: 4rem 0 0.2rem; font-size: 2rem; }
  /* Scoped under .page__content p to beat the theme's `.page__content p` margin
     rule, so the centering `margin: auto` and top spacing actually apply. */
  .page__content p.lp-lead { max-width: 720px; margin: 0.4rem auto 2.4rem; text-align: center; color: #4a453e; font-size: 1.12rem; line-height: 1.65; }
  .page__content p.lp-note { text-align: center; color: #8a8378; font-size: 0.92rem; margin: 3rem 0 0; }

  /* Alternating image + text feature rows. */
  .media-row { display: flex; align-items: center; gap: 3rem; margin: 3.4rem 0; }
  .media-row__media { flex: 1 1 56%; min-width: 0; }
  /* Transparent screenshots blend into the page — no frame or box-shadow
     (the app windows carry their own baked-in shadows). */
  .media-row__media img { display: block; width: 100%; height: auto; }
  .media-row__body { flex: 1 1 44%; }
  .media-row__eyebrow { display: inline-block; font-size: 0.76rem; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: #c96a45; margin: 0 0 0.55rem; }
  .media-row__body h3 { font-family: "Playfair Display", Georgia, serif; font-weight: 600; font-size: 1.7rem; line-height: 1.18; margin: 0 0 0.7rem; }
  .media-row__body p { color: #4a453e; font-size: 1.02rem; line-height: 1.65; margin: 0; }
  @media (min-width: 768px) { .media-row--reverse { flex-direction: row-reverse; } }
  @media (max-width: 767px) { .media-row { flex-direction: column; gap: 1.4rem; margin: 2.6rem 0; } }

  /* Secondary features: compact icon grid. */
  .feature-icons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2.4rem 2.8rem; margin: 2.4rem 0 0; }
  @media (max-width: 900px) { .feature-icons { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .feature-icons { grid-template-columns: 1fr; } }
  .feature-icon > i { display: block; font-size: 1.5rem; color: #c96a45; margin-bottom: 0.6rem; }
  .feature-icon h3 { font-family: "Playfair Display", Georgia, serif; font-weight: 600; font-size: 1.15rem; margin: 0 0 0.35rem; }
  .feature-icon p { color: #6f685f; font-size: 0.95rem; line-height: 1.55; margin: 0; }

  /* Closing CTA band. */
  .cta-band { background: #2f2b28; border-radius: 16px; padding: 3.2rem 2rem; text-align: center; margin: 4rem 0 1rem; }
  .page__content h2.cta-band__title { border-bottom: 0; padding-bottom: 0; color: #fff; margin: 0 0 0.7rem; font-size: 1.9rem; }
  .cta-band p { color: #d9d2c7; max-width: 640px; margin: 0 auto 1.7rem; font-size: 1.05rem; line-height: 1.6; }
  .cta-band .btn { margin: 0.3rem; }
</style>

<script>
  (function () {
    function place(d) {
      var s = d.querySelector(".js-dropdown__toggle");
      var m = d.querySelector(".js-dropdown__menu");
      if (!s || !m) return;
      var r = s.getBoundingClientRect();
      m.style.top = (r.bottom + 6) + "px";
      if ((d.getAttribute("data-align") || "left") === "right") {
        m.style.right = Math.max(8, window.innerWidth - r.right) + "px";
        m.style.left = "auto";
      } else {
        var mw = m.offsetWidth || 180;
        m.style.left = Math.max(8, Math.min(r.left, window.innerWidth - mw - 8)) + "px";
        m.style.right = "auto";
      }
    }
    function closeAll(except) {
      document.querySelectorAll("details.js-dropdown[open]").forEach(function (d) {
        if (d !== except) d.removeAttribute("open");
      });
    }
    // Position the menu when it opens (toggle does not bubble, so capture).
    document.addEventListener("toggle", function (e) {
      var d = e.target;
      if (d && d.classList && d.classList.contains("js-dropdown") && d.open) place(d);
    }, true);
    // Close when clicking outside the open dropdown.
    document.addEventListener("click", function (e) {
      var inside = e.target.closest ? e.target.closest("details.js-dropdown") : null;
      closeAll(inside);
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeAll(null);
    });
    window.addEventListener("resize", function () {
      document.querySelectorAll("details.js-dropdown[open]").forEach(place);
    });
    window.addEventListener("scroll", function () { closeAll(null); }, true);
  })();
</script>
