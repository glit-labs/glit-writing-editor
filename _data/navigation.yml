# Top navigation bar (used by the Minimal Mistakes masthead).
# `main` is the default (English). Per-language menus use `main_<code>` and fall
# back to `main` when a language's menu is not defined. Each language links to
# its own localized pages under `/<code>/`.
# Items with `children` render as a dropdown in the masthead.
main:
  - title: "What's New"
    children:
      - title: "Releases"
        url: /releases.html
      - title: "Changelog"
        url: /CHANGELOG.html
  - title: "Store"
    url: /store.html
  - title: "Support"
    children:
      - title: "Support"
        url: /support.html
      - title: "Privacy"
        url: /privacy.html

